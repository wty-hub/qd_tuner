org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Kotlin incremental compilation stores paths relative to the Android module. On Windows, if the
# Pub cache (e.g. C:\Users\...\Pub\Cache) and the project (e.g. D:\code\...) are on different drive
# letters, the compiler can throw "this and base files have different roots" when closing caches.
kotlin.incremental=false
